<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LC3-Navigator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <nav class="top-nav">
        <div class="logo-section">
            <div class="logo-icon"><i class="fas fa-map-marker-alt"></i></div>
            <div class="logo-text">
                <h1>LC3-Navigator</h1>
                <p>ระบบนำทางในอาคารบร.3</p>
            </div>
        </div>
        <button id="langToggle" class="lang-btn">TH</button>
    </nav>



    <div class="map-container" id="mapContainer">
        <div id="mapWrapper">
            <img src="resources/LC3-MAP-1stFloor.svg" id="mapImage" alt="Map Floor">
        </div>
    </div>

    <div class="floor-controls">
        <button class="floor-btn" data-floor="2">2</button>
        <button class="floor-btn active" data-floor="1">1</button>
    </div>

    <div class="zoom-controls">
        <button class="zoom-btn" id="zoomIn"><i class="fas fa-plus"></i></button>
        <button class="zoom-btn" id="zoomOut"><i class="fas fa-minus"></i></button>
    </div>
    <div class="search-overlay">
        <div class="search-box">
            <i class="fas fa-book-open text-gray"></i>
            <input type="text" id="searchInput" placeholder="ค้นหาห้องเรียน">
            <i class="fas fa-times text-gray" id="clearSearch" style="display: none; cursor: pointer;"></i>
        </div>
        <div class="search-tags" id="searchTags" style="margin-bottom: 15px;">
            <span class="tag-label">แนะนำ:</span>
            <button class="tag-btn"><i class="fas fa-restroom"></i> ห้องน้ำ</button>
            <button class="tag-btn"><i class="fas fa-stairs"></i> บันได</button>
        </div>

        <!-- ── Search Panel (US2) ── -->
        <div class="input-group" style="border-top: 1px solid #eee; padding-top: 15px;">
            <div class="input-wrapper" style="margin-bottom: 10px;">
                <div class="search-box" style="margin-bottom: 0;">
                    <span class="tiny-label" style="font-size: 12px; font-weight: bold; margin-right: 10px; color: #888;">FROM:</span>
                    <input type="text" id="start-query" placeholder="101" autocomplete="off" style="flex: 1; border: none; outline: none; background: transparent;">
                </div>
                <div class="suggestion-list" id="start-suggestions"></div>
            </div>

            <div class="input-wrapper" style="margin-bottom: 15px;">
                <div class="search-box" style="margin-bottom: 0;">
                    <span class="tiny-label" style="font-size: 12px; font-weight: bold; margin-right: 10px; color: #888;">TO:</span>
                    <input type="text" id="goal-query" placeholder="204" autocomplete="off" style="flex: 1; border: none; outline: none; background: transparent;">
                </div>
                <div class="suggestion-list" id="goal-suggestions"></div>
            </div>

            <button id="btn-navigate" onclick="navigateUser(event)" style="width: 100%; padding: 10px; background: #1a4d8c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Navigate</button>
        </div>
    </div>

    <div id="bottomSheet" class="bottom-sheet">
        <div class="drag-handle-container" id="dragHandle">
            <div class="drag-handle"></div>
        </div>
        <div id="sheetContent" class="sheet-content"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
